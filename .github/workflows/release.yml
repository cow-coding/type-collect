name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project CapCha.xcodeproj \
            -scheme CapCha \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/CapCha.app"
          DMG_NAME="CapCha-${GITHUB_REF_NAME}.dmg"

          create-dmg \
            --volname "CapCha" \
            --background "installer/dmg_background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "CapCha.app" 490 180 \
            --app-drop-link 170 180 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          body: |
            ## CapCha ${{ github.ref_name }}

            macOS menu bar app — type to collect keycaps!

            ### Install
            1. Download `CapCha-${{ github.ref_name }}.dmg`
            2. Open the DMG and drag **CapCha** to **Applications**
            3. Right-click → Open (first launch only, since the app is unsigned)
            4. Grant **Input Monitoring** permission when prompted

            ### Note
            This app is not code-signed. macOS will show a warning on first launch.
            Use **Right-click → Open** to bypass Gatekeeper.
