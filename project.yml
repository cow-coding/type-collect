name: Tapistry
options:
  bundleIdPrefix: com.tapistry
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  Tapistry:
    type: application
    platform: macOS
    sources:
      - Tapistry
    settings:
      base:
        PRODUCT_NAME: Tapistry
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Tapistry. All rights reserved."
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Debug:
          # Dev builds live beside the installed release — separate
          # bundle id keeps UserDefaults / storage from colliding.
          PRODUCT_BUNDLE_IDENTIFIER: com.tapistry.app.dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.tapistry.app
